<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo | BBR Fragrance</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="BBR Fragrance">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amber: {
                            300: '#D4BA85',
                            400: '#C9A96E',
                            500: '#B89A5D',
                            600: '#A8884E',
                            700: '#8F7340',
                            900: '#5C4A2A',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .login-card {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .login-bg {
            background:
                radial-gradient(ellipse at 20% 50%, rgba(201, 169, 110, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 169, 110, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(17, 24, 39, 1) 0%, transparent 50%),
                linear-gradient(180deg, #000000 0%, #0a0a0a 50%, #111827 100%);
        }

        .input-group input {
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(75, 85, 99, 0.5);
            transition: all 0.3s ease;
            color: #ffffff;
        }

        .input-group input::placeholder {
            color: rgba(156, 163, 175, 0.6);
        }

        .input-group input:focus {
            border-color: #C9A96E;
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.15), 0 0 20px rgba(201, 169, 110, 0.05);
            background: rgba(0, 0, 0, 0.6);
        }

        .input-group label {
            color: #d1d5db;
            font-weight: 500;
            letter-spacing: 0.025em;
        }

        .input-group .input-icon {
            color: rgba(201, 169, 110, 0.6);
            transition: color 0.3s ease;
        }

        .input-group input:focus ~ .input-icon,
        .input-group input:focus + .input-icon {
            color: #C9A96E;
        }

        .login-btn {
            background: linear-gradient(135deg, #C9A96E 0%, #B89A5D 50%, #A8884E 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(201, 169, 110, 0.2);
        }

        .login-btn:hover:not(:disabled) {
            box-shadow: 0 6px 25px rgba(201, 169, 110, 0.35);
            transform: translateY(-1px);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-logo {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 50%;
            border: 2.5px solid rgba(201, 169, 110, 0.5);
            box-shadow: 0 0 30px rgba(201, 169, 110, 0.15);
        }

        .gold-line {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #C9A96E, transparent);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .animate-in-delay {
            animation: fadeInUp 0.6s ease-out 0.15s forwards;
            opacity: 0;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-[420px]">

        <!-- Login Card -->
        <div class="login-card rounded-2xl p-8 sm:p-10 border border-gray-700/50 shadow-2xl animate-in">

            <!-- Header -->
            <div class="text-center mb-8">
                <img src="../images/logo1.jpeg" alt="BBR Fragrance" class="login-logo mx-auto mb-5">
                <h2 class="text-2xl font-semibold text-white mb-1">Bienvenido</h2>
                <div class="gold-line mx-auto my-3"></div>
                <p class="text-gray-400 text-sm">Accede al panel administrativo</p>
            </div>

            <!-- Form -->
            <form id="login-form" class="space-y-5 animate-in-delay">

                <!-- Username -->
                <div class="input-group">
                    <label for="username" class="block text-sm mb-2">Usuario</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 input-icon text-sm pointer-events-none"></i>
                        <input
                            type="text"
                            id="username"
                            required
                            class="w-full rounded-xl px-4 py-3.5 pl-11 text-sm focus:outline-none"
                            placeholder="Ingresa tu usuario"
                            autocomplete="username"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="password" class="block text-sm mb-2">Contrasena</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 input-icon text-sm pointer-events-none"></i>
                        <input
                            type="password"
                            id="password"
                            required
                            class="w-full rounded-xl px-4 py-3.5 pl-11 pr-12 text-sm focus:outline-none"
                            placeholder="Ingresa tu contrasena"
                            autocomplete="off"
                        >
                        <button
                            type="button"
                            id="toggle-password"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-amber-400 transition text-sm"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Error / Success message -->
                <div id="error-message" class="hidden rounded-xl p-3.5 text-sm flex items-center gap-2">
                    <i class="fas fa-exclamation-circle flex-shrink-0"></i>
                    <span id="error-text"></span>
                </div>

                <!-- Login Button -->
                <button
                    type="submit"
                    id="login-btn"
                    class="login-btn w-full text-black font-semibold py-3.5 rounded-xl flex items-center justify-center text-sm tracking-wide mt-2"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Iniciar Sesion
                </button>
            </form>

            <!-- 
            <div class="mt-6 p-4 bg-white/[0.03] border border-gray-700/50 rounded-xl">
                <p class="text-amber-400/80 text-xs font-semibold mb-2 flex items-center gap-1.5">
                    <i class="fas fa-info-circle"></i>Credenciales de prueba
                </p>
                <div class="flex gap-4 text-xs">
                    <p class="text-gray-400">Usuario: <span class="text-white font-mono bg-white/5 px-1.5 py-0.5 rounded">admin</span></p>
                    <p class="text-gray-400">Clave: <span class="text-white font-mono bg-white/5 px-1.5 py-0.5 rounded">admin123</span></p>
                </div>
            </div>
            Demo Credentials -->
        </div>

        <!-- Back to site -->
        <div class="text-center mt-6 animate-in-delay">
            <a href="../index.html" class="text-gray-500 hover:text-amber-400 transition text-sm inline-flex items-center gap-2">
                <i class="fas fa-arrow-left text-xs"></i>Volver al sitio
            </a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.pathname.replace(/\/pages\/[^\/]*$/, '') + '/api';

        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Login form submission via API
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const loginBtn = document.getElementById('login-btn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Verificando...';
            errorMessage.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    errorMessage.className = 'rounded-xl p-3.5 text-sm flex items-center gap-2 bg-green-500/10 border border-green-500/30 text-green-400';
                    errorMessage.querySelector('i').className = 'fas fa-check-circle flex-shrink-0';
                    errorText.textContent = 'Login exitoso! Redirigiendo...';

                    // Limpiar credenciales del DOM antes de redirigir
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';

                    setTimeout(() => {
                        // replace() elimina la pagina de login del historial
                        // El boton atras desde admin.html no puede volver aqui
                        window.location.replace('admin.html');
                    }, 800);
                } else {
                    errorMessage.className = 'rounded-xl p-3.5 text-sm flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400';
                    errorMessage.querySelector('i').className = 'fas fa-exclamation-circle flex-shrink-0';
                    errorText.textContent = result.message || 'Usuario o contrasena incorrectos';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesion';
                }
            } catch (error) {
                errorMessage.className = 'rounded-xl p-3.5 text-sm flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400';
                errorMessage.querySelector('i').className = 'fas fa-exclamation-circle flex-shrink-0';
                errorText.textContent = 'Error de conexion con el servidor. Verifique que XAMPP este activo.';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesion';
            }
        });

        // Limpiar formulario si el browser restaura la pagina desde bfcache (boton atras)
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('error-message').classList.add('hidden');
                const btn = document.getElementById('login-btn');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesion';
            }
        });

        // Redirigir si ya tiene sesion activa
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`${API_BASE}/auth/check`, { credentials: 'include' });
                const result = await response.json();
                if (result.success) {
                    window.location.replace('admin.html');
                }
            } catch (e) {
                // No autenticado, quedarse en login
            }
        });
    </script>
</body>
</html>
