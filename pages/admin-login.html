<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bbr_Fragance</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-900 min-h-screen flex items-center justify-center">
    
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto">
            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-serif text-amber-400 mb-2">Bbr_Fragance</h1>
                <p class="text-gray-400">Panel Administrativo</p>
            </div>
            
            <!-- Login Card -->
            <div class="bg-gray-800/50 backdrop-blur rounded-lg p-8 border border-gray-700 shadow-2xl">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-user-shield text-4xl text-amber-400"></i>
                    </div>
                    <h2 class="text-2xl font-semibold mb-2">Iniciar Sesión</h2>
                    <p class="text-gray-400 text-sm">Accede al panel administrativo</p>
                </div>
                
                <form id="login-form" class="space-y-6">
                    <!-- Usuario -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Usuario</label>
                        <div class="relative">
                            <input 
                                type="text" 
                                id="username" 
                                required
                                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 pl-12 focus:outline-none focus:border-amber-500 transition"
                                placeholder="Ingresa tu usuario"
                            >
                            <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    
                    <!-- Contraseña -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Contraseña</label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                required
                                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 pl-12 pr-12 focus:outline-none focus:border-amber-500 transition"
                                placeholder="Ingresa tu contraseña"
                            >
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <button 
                                type="button" 
                                id="toggle-password" 
                                class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white transition"
                            >
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Recordar sesión -->
                    <div class="flex items-center">
                        <input 
                            type="checkbox" 
                            id="remember" 
                            class="w-4 h-4 bg-gray-900 border-gray-700 rounded text-amber-500 focus:ring-amber-500"
                        >
                        <label for="remember" class="ml-2 text-sm text-gray-400">Recordar sesión</label>
                    </div>
                    
                    <!-- Error message -->
                    <div id="error-message" class="hidden bg-red-500/10 border border-red-500 text-red-400 rounded-lg p-3 text-sm">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span id="error-text"></span>
                    </div>
                    
                    <!-- Botón Login -->
                    <button 
                        type="submit" 
                        class="w-full bg-amber-500 text-black font-semibold py-3 rounded-lg hover:bg-amber-400 transition transform hover:scale-105 flex items-center justify-center"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Iniciar Sesión
                    </button>
                </form>
                
                <!-- Demo Credentials -->
                <div class="mt-6 p-4 bg-blue-500/10 border border-blue-500/30 rounded-lg">
                    <p class="text-blue-400 text-sm font-semibold mb-2">
                        <i class="fas fa-info-circle mr-2"></i>Credenciales de prueba:
                    </p>
                    <p class="text-gray-400 text-xs">Usuario: <span class="text-white font-mono">admin</span></p>
                    <p class="text-gray-400 text-xs">Contraseña: <span class="text-white font-mono">admin123</span></p>
                </div>
            </div>
            
            <!-- Volver al sitio -->
            <div class="text-center mt-6">
                <a href="../index.html" class="text-gray-400 hover:text-amber-400 transition text-sm">
                    <i class="fas fa-arrow-left mr-2"></i>Volver al sitio
                </a>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Login form submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            // Credenciales de prueba (en producción esto debería ser una API)
            const validUsername = 'admin';
            const validPassword = 'admin123';
            
            if (username === validUsername && password === validPassword) {
                // Guardar sesión
                const sessionData = {
                    username: username,
                    loginTime: new Date().toISOString(),
                    remember: remember
                };
                
                if (remember) {
                    localStorage.setItem('admin_session', JSON.stringify(sessionData));
                } else {
                    sessionStorage.setItem('admin_session', JSON.stringify(sessionData));
                }
                
                // Mostrar mensaje de éxito
                errorMessage.classList.remove('hidden', 'bg-red-500/10', 'border-red-500', 'text-red-400');
                errorMessage.classList.add('bg-green-500/10', 'border-green-500', 'text-green-400');
                errorText.textContent = '¡Login exitoso! Redirigiendo...';
                
                // Redireccionar al panel admin
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                // Mostrar error
                errorMessage.classList.remove('hidden', 'bg-green-500/10', 'border-green-500', 'text-green-400');
                errorMessage.classList.add('bg-red-500/10', 'border-red-500', 'text-red-400');
                errorText.textContent = 'Usuario o contraseña incorrectos';
            }
        });

        // Verificar si ya hay sesión activa
        window.addEventListener('DOMContentLoaded', () => {
            const sessionStorage = sessionStorage.getItem('admin_session');
            const localStorage = window.localStorage.getItem('admin_session');
            
            if (sessionStorage || localStorage) {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
